<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>focus.fm — Community</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="community.css?v=1" />
  <script>if(localStorage.getItem('theme')!=='light')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>

  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-text"><span class="brand-red">focus</span>.fm</span>
      <div class="topbar-divider"></div>
      <img src="assets/icon-logo-mark.svg" alt="" class="brand-mark" />
    </div>
    <div class="topbar-user">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-name" id="topbar-username"></span>
      <img src="assets/icon-as.svg" alt="" class="user-chevron" />
    </div>
  </header>

  <div class="app-shell">

    <nav class="sidenav">
      <a class="sidenav-item" data-page="overview" href="overview.html">
        <img src="assets/icon-overview.svg" class="sidenav-icon" alt="" />
        <span>Overview</span>
      </a>
      <a class="sidenav-item" data-page="scrobbles" href="scrobbles.html">
        <img src="assets/icon-scrobbles.svg" class="sidenav-icon" alt="" />
        <span>Scrobbles</span>
      </a>
      <a class="sidenav-item" data-page="grid-generator" href="grid-generator.html">
        <img src="assets/icon-grid.svg" class="sidenav-icon" alt="" />
        <span>Grid Generator</span>
      </a>
      <a class="sidenav-item" data-page="community" href="community.html">
        <img src="assets/icon-community.svg" class="sidenav-icon" alt="" />
        <span>Community</span>
      </a>
    </nav>

    <div class="content-area">

      <!-- Sub-header -->
      <div class="cm-subheader">
        <div class="cm-subheader-left">
          <h1 class="cm-title" id="cm-title">&nbsp;</h1>
          <p class="cm-meta" id="cm-meta">&nbsp;</p>
        </div>
      </div>

      <!-- Main content -->
      <main class="main-content">
        <p class="cm-count" id="cm-count">&nbsp;</p>
        <div class="cm-grid" id="cm-grid"></div>
        <div class="cm-sentinel" id="cm-sentinel"></div>
      </main>

    </div><!-- /content-area -->
  </div><!-- /app-shell -->

  <script src="shell.js"></script>
  <script src="lastfm.js"></script>
  <script src="community.js"></script>
</body>
</html>
